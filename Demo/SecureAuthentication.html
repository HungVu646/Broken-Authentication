<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>✅ SECURE AUTHENTICATION - Assignment Manager (Fixed)</title>
    <style>
        * {
            box-sizing: border-box;
            font-family: system-ui, 'Segoe UI', sans-serif;
        }
        body {
            background: linear-gradient(135deg, #e0f2e9 0%, #b8dfc8 100%);
            margin: 0;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 1.5rem;
        }
        .container {
            max-width: 600px;
            width: 100%;
            background: white;
            border-radius: 2rem;
            box-shadow: 0 25px 45px rgba(0,0,0,0.3);
            overflow: hidden;
            border-top: 8px solid #2ecc71;
        }
        .header {
            background: #e6f7ec;
            padding: 1.5rem;
            text-align: center;
            border-bottom: 2px solid #a3e0b0;
        }
        .header h1 {
            margin: 0;
            color: #1f6e43;
            font-size: 1.8rem;
        }
        .badge {
            display: inline-block;
            background: #2ecc71;
            color: white;
            padding: 0.3rem 1rem;
            border-radius: 30px;
            font-size: 0.8rem;
            margin-top: 0.5rem;
        }
        .secure-features {
            background: #d4edda;
            padding: 0.8rem;
            margin: 1rem;
            border-radius: 1rem;
            font-size: 0.8rem;
            color: #155724;
        }
        .body {
            padding: 2rem;
        }
        .login-form {
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }
        .input-group {
            display: flex;
            flex-direction: column;
            gap: 6px;
        }
        label {
            font-weight: 600;
            color: #2c3e66;
        }
        input {
            padding: 12px 14px;
            border-radius: 28px;
            border: 1px solid #ddd;
            font-size: 1rem;
        }
        input:focus {
            outline: none;
            border-color: #2ecc71;
            box-shadow: 0 0 0 3px rgba(46,204,113,0.2);
        }
        button {
            background: #1f6e43;
            color: white;
            padding: 12px;
            border: none;
            border-radius: 40px;
            font-weight: bold;
            cursor: pointer;
            font-size: 1rem;
            transition: 0.2s;
        }
        button:hover {
            background: #155a36;
        }
        button:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }
        .logout-btn {
            background: #e67e22;
            margin-top: 1rem;
        }
        .logout-btn:hover {
            background: #d35400;
        }
        .status {
            margin-top: 1rem;
            padding: 12px;
            border-radius: 24px;
            font-size: 0.85rem;
        }
        .error-msg {
            color: #b91c1c;
            background: #fee2e2;
        }
        .success-msg {
            color: #166534;
            background: #dcfce7;
        }
        .info-msg {
            color: #0c5460;
            background: #d1ecf1;
        }
        .dashboard {
            background: #f9fafb;
            border-radius: 1.5rem;
            padding: 1.2rem;
            border: 1px solid #e5e7eb;
        }
        .log-area {
            background: #1e293b;
            color: #cbd5e6;
            font-family: monospace;
            font-size: 0.7rem;
            padding: 10px;
            border-radius: 1rem;
            max-height: 200px;
            overflow-y: auto;
            margin-top: 1rem;
        }
        .lockout-warning {
            background: #fff3cd;
            color: #856404;
            padding: 8px;
            border-radius: 8px;
            font-size: 0.75rem;
            margin-top: 0.5rem;
            text-align: center;
        }
        .timer {
            font-family: monospace;
            font-size: 0.9rem;
            font-weight: bold;
            color: #e67e22;
        }
        hr {
            margin: 1rem 0;
        }
    </style>
</head>
<body>
<div class="container">
    <div class="header">
        <h1>✅ SECURE AUTHENTICATION</h1>
        <div class="badge">FIXED VERSION</div>
    </div>
    <div class="body" id="mainContent">
        <!-- Dynamic content -->
    </div>
</div>

<script>
    // User database loaded from users.json
    let USERS_DB = [];

    // Secure session (with timeout)
    let secureSession = null;

    // Load users from users.json
    async function loadUsers() {
        try {
            const response = await fetch('users.json');
            USERS_DB = await response.json();
            addSecurityLog(`📂 Đã tải ${USERS_DB.length} người dùng từ users.json`, false);
        } catch (e) {
            addSecurityLog(`❌ Không thể tải users.json: ${e.message}`, true);
        }
        startSessionMonitor();
        renderUI();
    }
    
    // Lockout tracking
    let lockouts = new Map(); // username -> { failedCount, lockedUntil }
    let failureCounts = new Map(); // username -> number
    
    // Logs
    let securityLogs = [];
    
    // Session timeout (milliseconds) - 5 minutes
    const SESSION_TIMEOUT_MS = 20 * 1000;
    const LOCKOUT_DURATION_MS = 20 * 1000; // 5 minutes
    const MAX_FAILED_ATTEMPTS = 5;
    
    // MFA mock state
    let pendingMfaUser = null;
    let pendingMfaFull = null;
    let pendingMfaRole = null;

    function escapeHtml(str) {
        if (!str) return '';
        return String(str).replace(/[&<>]/g, function(m) {
            if (m === '&') return '&amp;';
            if (m === '<') return '&lt;';
            if (m === '>') return '&gt;';
            return m;
        });
    }

    function addSecurityLog(message, isError = false, isInfo = false) {
        securityLogs.unshift({
            time: new Date().toLocaleTimeString(),
            message: message,
            isError: isError,
            isInfo: isInfo
        });
        if (securityLogs.length > 50) securityLogs.pop();
        updateLogDisplay();
    }

    function updateLogDisplay() {
        const logContainer = document.getElementById('logDisplay');
        if (!logContainer) return;
        logContainer.innerHTML = securityLogs.map(log => {
            let color = '#a5f3c3';
            if (log.isError) color = '#f87171';
            if (log.isInfo) color = '#fbbf24';
            return `<div style="color: ${color}; border-bottom: 1px solid #334155; padding: 4px 0; font-size: 0.7rem;">
                [${log.time}] ${escapeHtml(log.message)}
            </div>`;
        }).join('');
    }

    function isAccountLocked(username) {
        const lock = lockouts.get(username);
        if (lock && lock.lockedUntil > Date.now()) {
            const remaining = Math.ceil((lock.lockedUntil - Date.now()) / 1000);
            addSecurityLog(`🔒 Tài khoản ${username} đang bị khóa (còn ${remaining} giây)`, true);
            return true;
        } else if (lock && lock.lockedUntil <= Date.now()) {
            lockouts.delete(username);
            failureCounts.set(username, 0);
            addSecurityLog(`🔓 Tài khoản ${username} đã được mở khóa`, false);
        }
        return false;
    }

    function registerFailedAttempt(username) {
        let fails = failureCounts.get(username) || 0;
        fails++;
        failureCounts.set(username, fails);
        
        addSecurityLog(`❌ Thất bại lần ${fails}/${MAX_FAILED_ATTEMPTS} cho ${username}`, true);
        
        if (fails >= MAX_FAILED_ATTEMPTS) {
            const lockedUntil = Date.now() + LOCKOUT_DURATION_MS;
            lockouts.set(username, { failedCount: fails, lockedUntil });
            addSecurityLog(`🔴 TÀI KHOẢN ${username} ĐÃ BỊ KHÓA trong 20 giây do nhập sai ${MAX_FAILED_ATTEMPTS} lần!`, true);
            return true;
        }
        return false;
    }

    function resetFailures(username) {
        failureCounts.set(username, 0);
    }

    // Session management
    function saveSecureSession() {
        if (secureSession) {
            localStorage.setItem('secure_session', JSON.stringify(secureSession));
        }
    }

    function loadSecureSession() {
        const saved = localStorage.getItem('secure_session');
        if (saved) {
            try {
                const session = JSON.parse(saved);
                const now = Date.now();
                const idle = now - session.lastActivity;
                if (idle > SESSION_TIMEOUT_MS) {
                    addSecurityLog(`⏰ Session đã hết hạn do không hoạt động ${Math.floor(idle/1000)} giây`, true);
                    destroySecureSession();
                    return null;
                }
                secureSession = session;
                secureSession.lastActivity = now;
                saveSecureSession();
                addSecurityLog(`🔄 Đã khôi phục session cho ${secureSession.username}`, false);
                return secureSession;
            } catch(e) {}
        }
        return null;
    }

    function destroySecureSession() {
        if (secureSession) {
            addSecurityLog(`🔐 Đã hủy session của ${secureSession.username} (logout hoặc timeout)`, false);
        }
        secureSession = null;
        localStorage.removeItem('secure_session');
        pendingMfaUser = null;
        pendingMfaFull = null;
        pendingMfaRole = null;
    }

    function updateSessionActivity() {
        if (secureSession) {
            secureSession.lastActivity = Date.now();
            saveSecureSession();
        }
    }

    // Check session timeout periodically
    function startSessionMonitor() {
        setInterval(() => {
            if (secureSession) {
                const now = Date.now();
                const idle = now - secureSession.lastActivity;
                if (idle > SESSION_TIMEOUT_MS) {
                    addSecurityLog(`⏰ Session timeout: không hoạt động ${Math.floor(idle/1000)} giây`, true);
                    destroySecureSession();
                    renderUI();
                }
            }
        }, 10000); // Check every 10 seconds
    }

    function performLogin(username, password, mfaCode = null) {
        // Check lockout
        if (isAccountLocked(username)) {
            renderUI();
            return false;
        }
        
        const user = USERS_DB.find(u => u.username === username && u.password === password);
        
        if (!user) {
            registerFailedAttempt(username);
            renderUI();
            return false;
        }
        
        // Password correct - require MFA
        if (!mfaCode) {
            pendingMfaUser = user.username;
            pendingMfaFull = user.fullname;
            pendingMfaRole = user.role;
            addSecurityLog(`🔐 Mật khẩu đúng cho ${username}, yêu cầu MFA`, false);
            renderUI(true); // Show MFA form
            return false;
        }
        
        // Verify MFA
        if (mfaCode !== "123456") {
            addSecurityLog(`❌ Mã MFA sai cho ${username}`, true);
            renderUI();
            return false;
        }
        
        // Success!
        resetFailures(username);
        secureSession = {
            username: user.username,
            fullname: user.fullname,
            role: user.role,
            lastActivity: Date.now()
        };
        saveSecureSession();
        addSecurityLog(`✅ ĐĂNG NHẬP THÀNH CÔNG: ${username} với MFA`, false);
        pendingMfaUser = null;
        renderUI();
        return true;
    }

    function renderUI(showMfaForm = false) {
        const container = document.getElementById('mainContent');
        if (!container) return;
        
        // Try to load existing session
        if (!secureSession) {
            loadSecureSession();
        }
        
        if (secureSession) {
            // Update activity on every render
            updateSessionActivity();
            const remainingTime = SESSION_TIMEOUT_MS - (Date.now() - secureSession.lastActivity);
            const remainingSeconds = Math.max(0, Math.floor(remainingTime / 1000));
            
            container.innerHTML = `
                <div class="dashboard">
                    <h3>📚 Chào mừng, ${escapeHtml(secureSession.fullname)}</h3>
                    <p><strong>Username:</strong> ${escapeHtml(secureSession.username)}</p>
                    <p><strong>Vai trò:</strong> ${escapeHtml(secureSession.role)}</p>
                    <p><strong>⏱️ Session timeout:</strong> <span class="timer" id="sessionTimer">${remainingSeconds}</span> giây</p>
                    <hr>
                    <h4>📝 Bài tập gần đây</h4>
                    <ul>
                        <li>Bài 1: Bảo mật cơ bản - Đã nộp (9.5 điểm)</li>
                        <li>Bài 2: Broken Authentication - Đang làm</li>
                        <li>Bài 3: Secure Coding - Chưa bắt đầu</li>
                    </ul>
                    <div class="lockout-warning">
                        ✅ <strong>Bảo mật đã được kích hoạt:</strong><br>
                        • Session sẽ tự động hết hạn sau 20 giây không hoạt động<br>
                        • Logout sẽ xóa session hoàn toàn<br>
                        • Đã bảo vệ bằng MFA
                    </div>
                    <button id="logoutBtn" class="logout-btn">🚪 Đăng xuất (Xóa session)</button>
                    <div class="log-area" id="logDisplay"></div>
                </div>
            `;
            
            document.getElementById('logoutBtn')?.addEventListener('click', () => {
                destroySecureSession();
                renderUI();
            });
            
            // Timer countdown
            const timerElem = document.getElementById('sessionTimer');
            if (timerElem) {
                const timerInterval = setInterval(() => {
                    if (!secureSession) {
                        clearInterval(timerInterval);
                        return;
                    }
                    const now = Date.now();
                    const remaining = SESSION_TIMEOUT_MS - (now - secureSession.lastActivity);
                    if (remaining <= 0) {
                        clearInterval(timerInterval);
                        destroySecureSession();
                        renderUI();
                    } else if (timerElem) {
                        timerElem.innerText = Math.floor(remaining / 1000);
                    }
                }, 1000);
            }
            
            updateLogDisplay();
        } else if (pendingMfaUser && showMfaForm) {
            // MFA form
            container.innerHTML = `
                <div class="login-form">
                    <div class="info-msg status" style="background: #d1ecf1; margin-bottom: 1rem;">
                        ✅ Mật khẩu đúng cho ${escapeHtml(pendingMfaUser)}<br>
                        Vui lòng nhập mã MFA để hoàn tất đăng nhập
                    </div>
                    <div class="input-group">
                        <label>🔢 Mã OTP </label>
                        <input type="text" id="mfaCode" placeholder="Nhập mã 6 số" autocomplete="off">
                    </div>
                    <button id="verifyMfaBtn">✅ Xác thực MFA</button>
                    <button id="cancelMfaBtn" style="background: #95a5a6;">❌ Hủy</button>
                    <div id="statusMsg" class="status"></div>
                    <div class="log-area" id="logDisplay"></div>
                </div>
            `;
            
            const verifyBtn = document.getElementById('verifyMfaBtn');
            const cancelBtn = document.getElementById('cancelMfaBtn');
            const mfaInput = document.getElementById('mfaCode');
            const statusDiv = document.getElementById('statusMsg');
            
            verifyBtn?.addEventListener('click', () => {
                const code = mfaInput.value.trim();
                if (code === "123456") {
                    secureSession = {
                        username: pendingMfaUser,
                        fullname: pendingMfaFull,
                        role: pendingMfaRole,
                        lastActivity: Date.now()
                    };
                    saveSecureSession();
                    addSecurityLog(`✅ MFA thành công cho ${pendingMfaUser}`, false);
                    pendingMfaUser = null;
                    renderUI();
                } else {
                    statusDiv.innerHTML = '❌ Mã OTP không đúng!';
                    statusDiv.className = 'status error-msg';
                    addSecurityLog(`❌ MFA thất bại cho ${pendingMfaUser}`, true);
                    pendingMfaUser = null;
                    renderUI();
                }
            });
            
            cancelBtn?.addEventListener('click', () => {
                pendingMfaUser = null;
                renderUI();
            });
            
            mfaInput?.addEventListener('keypress', (e) => {
                if (e.key === 'Enter') verifyBtn?.click();
            });
            
            updateLogDisplay();
        } else {
            // Login form
            container.innerHTML = `
                <div class="login-form">
                    <div class="input-group">
                        <label>👤 Tên đăng nhập</label>
                        <input type="text" id="username" placeholder="student / teacher / admin" autocomplete="off">
                    </div>
                    <div class="input-group">
                        <label>🔑 Mật khẩu</label>
                        <input type="password" id="password" placeholder="Nhập mật khẩu">
                    </div>
                    <button id="loginBtn">🔐 Đăng nhập (Có bảo vệ)</button>
                    <div id="statusMsg" class="status"></div>
                    <div class="lockout-warning">
                        <strong>🛡️ Chính sách bảo mật:</strong><br>
                        • Sai ${MAX_FAILED_ATTEMPTS} lần → khóa 20 giây<br>
                        • Bắt buộc MFA <br>
                        • Session hết hạn sau 20 giây
                    </div>
                    <div class="log-area" id="logDisplay"></div>
                </div>
            `;
            
            const loginBtn = document.getElementById('loginBtn');
            const usernameInput = document.getElementById('username');
            const passwordInput = document.getElementById('password');
            const statusDiv = document.getElementById('statusMsg');
            
            const doLogin = () => {
                const uname = usernameInput.value.trim();
                const pwd = passwordInput.value;
                
                if (isAccountLocked(uname)) {
                    statusDiv.innerHTML = `🔒 Tài khoản đang bị khóa do nhập sai quá nhiều lần!`;
                    statusDiv.className = 'status error-msg';
                    renderUI();
                    return;
                }
                
                performLogin(uname, pwd, null);
            };
            
            loginBtn?.addEventListener('click', doLogin);
            usernameInput?.addEventListener('keypress', (e) => { if(e.key === 'Enter') doLogin(); });
            passwordInput?.addEventListener('keypress', (e) => { if(e.key === 'Enter') doLogin(); });
            updateLogDisplay();
        }
    }
    
    // Initialize - load users từ file trước rồi render
    loadUsers();
</script>
</body>
</html>
